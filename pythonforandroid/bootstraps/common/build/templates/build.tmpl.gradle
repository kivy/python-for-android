// Top-level build file where you can add configuration options common to all sub-projects/modules.
buildscript {
    repositories {
       google()
       mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.1'
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        {%- for repo in args.gradle_repositories %}
        {{repo}}
        {%- endfor %}
        maven {
            url 'https://pkgs.dev.azure.com/MicrosoftDeviceSDK/DuoSDK-Public/_packaging/Duo-SDK-Feed/maven/v1'
        }
    }
}

{% if is_library %}
apply plugin: 'com.android.library'
{% else %}
apply plugin: 'com.android.application'
{% endif %}

android {
    namespace '{{ args.package }}'
    compileSdkVersion {{ android_api }}
    buildToolsVersion '{{ build_tools_version }}'
    
    defaultConfig {
        minSdkVersion {{ args.min_sdk_version }}
        targetSdkVersion {{ android_api }}
        versionCode {{ args.numeric_version }}
        versionName '{{ args.version }}'
        manifestPlaceholders = {{ args.manifest_placeholders}}
        
        // Fix for AGP 8.x release packaging with legacy packaging
        ndk {
            abiFilters.clear()
            abiFilters 'arm64-v8a'
        }
    }

	
	packaging {
        jniLibs {
            useLegacyPackaging = true
            {% if debug_build -%}
            keepDebugSymbols += ['**/*.so']
            {%- endif %}
        }
        resources {
            {% if not debug_build -%}
            excludes += ['lib/**/gdbserver', 'lib/**/gdb.setup']
            {%- endif %}
            excludes += ['META-INF/*.kotlin_module', 'META-INF/DEPENDENCIES', 'META-INF/LICENSE', 'META-INF/NOTICE']
            {%- if args.packaging_options %}
            {%- for option in args.packaging_options %}
            {{option}}
            {%- endfor %}
            {%- endif %}
        }
	}


	{% if args.sign -%}
	signingConfigs {
		release {
			storeFile file(System.getenv("P4A_RELEASE_KEYSTORE"))
			keyAlias System.getenv("P4A_RELEASE_KEYALIAS")
			storePassword System.getenv("P4A_RELEASE_KEYSTORE_PASSWD")
			keyPassword System.getenv("P4A_RELEASE_KEYALIAS_PASSWD")
		}
	}

    {%- endif %}

    buildTypes {
        debug {
        }
        release {
            {% if args.sign -%}
            signingConfig signingConfigs.release
            {%- endif %}
            // Disable optimizations that conflict with legacy packaging in AGP 8.x
            minifyEnabled false
            shrinkResources false
            crunchPngs false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
        {%- for option in args.compile_options %}
        {{option}}
        {%- endfor %}
    }

    sourceSets {
        main {
            jniLibs.srcDir 'libs'
            java {

                {%- for adir, pattern in args.extra_source_dirs -%}
                    srcDir '{{adir}}'
                {%- endfor -%}

            }
        }
    }

    aaptOptions {
        noCompress "tflite"
    }

}

dependencies {
    {%- for aar in aars %}
    implementation(name: '{{ aar }}', ext: 'aar')
    {%- endfor -%}
    {%- for jar in jars %}
    implementation files('src/main/libs/{{ jar }}')
    {%- endfor -%}
    {%- if args.depends -%}
    {%- for depend in args.depends %}
    implementation '{{ depend }}'
    {%- endfor %}
    {%- endif %}
    {% if args.presplash_lottie %}
    implementation 'com.airbnb.android:lottie:6.1.0'
    {%- endif %}
    implementation 'com.android.volley:volley:1.2.1'
    implementation("com.microsoft.identity.client:msal:5.10.2") {
        exclude group: 'io.opentelemetry', module: 'opentelemetry-bom'
    }
    implementation 'com.microsoft.identity:common4j:20.1.1'
    implementation 'com.microsoft.identity:common:20.1.1'
}

